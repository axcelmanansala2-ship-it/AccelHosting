name: AccelHosting APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew 2>/dev/null || true

      - name: Generate Release Keystore
        run: |
          keytool -genkeypair \
            -alias accel \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore keystore.jks \
            -storepass AccelHosting2024 \
            -keypass AccelHosting2024 \
            -dname "CN=AccelHosting, OU=Mobile, O=AccelHosting, L=City, ST=State, C=US"

      - name: Build Release APK
        run: |
          gradle assembleRelease \
            -PKEYSTORE_PATH=keystore.jks \
            -PKEYSTORE_PASS=AccelHosting2024 \
            -PKEY_ALIAS=accel \
            -PKEY_PASS=AccelHosting2024
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASS: AccelHosting2024
          KEY_ALIAS: accel
          KEY_PASS: AccelHosting2024

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AccelHosting-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
